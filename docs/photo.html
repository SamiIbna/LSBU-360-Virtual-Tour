<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LSBU 360 Photo Tour</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-tour page-photo" data-page-mode="photo">
  <div class="loading" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading photo scene...</div>
    <div class="loading-sub">LSBU 360 Photo Tour</div>
  </div>

  <div class="toast" id="toast"></div>

  <a-scene
    id="scene"
    vr-mode-ui="enabled: true"
    loading-screen="enabled: false"
    renderer="antialias: true; colorManagement: true"
    background="color: #ffffff">

    <a-assets id="assets">
      <video id="video360" crossorigin="anonymous" muted playsinline webkit-playsinline loop preload="auto"></video>
    </a-assets>

    <a-entity id="rig" position="0 0 0">
      <a-camera id="cam" position="0 1.6 0" look-controls="touchEnabled: true" wasd-controls="enabled: false">
        <a-cursor raycaster="objects: .vr-clickable" fuse="false"
                  material="shader: flat; color: #2563eb"
                  geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.013"
                  position="0 0 -0.5"></a-cursor>
      </a-camera>
    </a-entity>

    <a-videosphere id="videoSphere" src="#video360" rotation="0 -90 0" visible="false"></a-videosphere>
    <a-sky id="photoSphere" rotation="0 -90 0" visible="false"></a-sky>

    <a-entity id="vrPanel" visible="false" position="0 1.3 -1.8">
      <a-plane width="2.2" height="0.95" color="#ffffff" opacity="0.92" material="shader: flat; side: double"></a-plane>
      <a-text value="LSBU 360 Photo Tour" color="#111827" width="1.8" align="center" position="0 0.36 0.01"></a-text>

      <a-entity position="0 0.16 0.01">
        <a-entity position="-0.54 0 0"><a-plane class="vr-clickable" data-action="building" data-id="hub" width="0.28" height="0.12" color="#e5efff"></a-plane><a-text value="Hub" color="#111827" width="0.8" align="center" position="0 0 0.015"></a-text></a-entity>
        <a-entity position="-0.18 0 0"><a-plane class="vr-clickable" data-action="building" data-id="keyworth" width="0.28" height="0.12" color="#e5efff"></a-plane><a-text value="Keyworth" color="#111827" width="0.8" align="center" position="0 0 0.015"></a-text></a-entity>
        <a-entity position="0.18 0 0"><a-plane class="vr-clickable" data-action="building" data-id="faraday" width="0.28" height="0.12" color="#e5efff"></a-plane><a-text value="Faraday" color="#111827" width="0.8" align="center" position="0 0 0.015"></a-text></a-entity>
        <a-entity position="0.54 0 0"><a-plane class="vr-clickable" data-action="building" data-id="perry" width="0.28" height="0.12" color="#e5efff"></a-plane><a-text value="Perry" color="#111827" width="0.8" align="center" position="0 0 0.015"></a-text></a-entity>
      </a-entity>

      <a-entity position="0 -0.04 0.01">
        <a-entity position="-0.72 0 0"><a-plane class="vr-clickable" data-action="prev" width="0.42" height="0.12" color="#f3f4f6"></a-plane><a-text value="Stop -" color="#374151" width="0.9" align="center" position="0 0 0.015"></a-text></a-entity>
        <a-entity position="-0.24 0 0"><a-plane class="vr-clickable" data-action="next" width="0.42" height="0.12" color="#f3f4f6"></a-plane><a-text value="Stop +" color="#374151" width="0.9" align="center" position="0 0 0.015"></a-text></a-entity>
        <a-entity position="0.24 0 0"><a-plane class="vr-clickable" data-action="video-page" width="0.42" height="0.12" color="#2563eb"></a-plane><a-text value="Video" color="#ffffff" width="0.9" align="center" position="0 0 0.015"></a-text></a-entity>
        <a-entity position="0.72 0 0"><a-plane class="vr-clickable" data-action="home" width="0.42" height="0.12" color="#fee2e2"></a-plane><a-text value="Home" color="#991b1b" width="0.9" align="center" position="0 0 0.015"></a-text></a-entity>
      </a-entity>

      <a-entity position="0 -0.22 0.01">
        <a-entity position="-0.32 0 0"><a-plane class="vr-clickable" data-action="photo-prev" width="0.55" height="0.12" color="#f3f4f6"></a-plane><a-text value="Photo -" color="#374151" width="1.0" align="center" position="0 0 0.015"></a-text></a-entity>
        <a-entity position="0.32 0 0"><a-plane class="vr-clickable" data-action="photo-next" width="0.55" height="0.12" color="#f3f4f6"></a-plane><a-text value="Photo +" color="#374151" width="1.0" align="center" position="0 0 0.015"></a-text></a-entity>
      </a-entity>

      <a-text id="vrStopText" value="Stop 1/4 - The Hub" color="#2563eb" width="1.8" align="center" position="0 -0.37 0.01"></a-text>
    </a-entity>
  </a-scene>

  <div class="hud" id="htmlHud">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo-mark"><span class="live-dot"></span>LSBU 360</div>
        <div class="pill stop-pill" id="stopPill">Stop 1 / 4</div>
        <div class="pill mode-pill photo" id="modePill">PHOTO</div>
      </div>
      <div class="topbar-right">
        <a class="icon-btn" href="help.html" title="Help">?</a>
        <a class="icon-btn" href="index.html" title="Home">&#8962;</a>
      </div>
    </div>

    <div class="panel">
      <div class="building-tabs" id="buildingTabs"></div>

      <div class="controls">
        <a class="ctrl-btn" id="videoPageBtn" href="video.html?stop=hub" title="Open video page">Video Page</a>

        <div class="info-bar">
          <div class="info-name" id="infoName">The Hub</div>
          <div class="info-desc" id="infoDesc">Central student support and community space.</div>
        </div>

        <div class="nav-cluster">
          <button class="ctrl-btn" id="prevBtn" title="Previous stop">Prev Stop</button>
          <button class="ctrl-btn" id="nextBtn" title="Next stop">Next Stop</button>
        </div>

        <button class="ctrl-btn" id="photoPrevBtn" title="Previous photo">Prev Photo</button>
        <button class="ctrl-btn" id="photoNextBtn" title="Next photo">Next Photo</button>

        <div class="photo-counter visible" id="photoCounter">
          Photo <span id="photoNum">1</span> / <span id="photoTotal">4</span>
        </div>
      </div>

      <div class="debug-bar" id="debugBar"></div>
    </div>
  </div>

  <script src="js/app.js?v=photo-20260401"></script>
</body>
</html>
